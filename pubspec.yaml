name: invex_up
description: "Coding challenge"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  intl: ^0.20.2
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  toastification: ^3.0.3
  flutter_native_splash: ^2.4.3
  fl_chart: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: assets/icon.png
  image_path: assets/icon.png
  remove_alpha_ios: true
  min_sdk_android: 21

flutter_native_splash:
  color: "#0A0F1E"
  color_dark: "#0A0F1E"
  image: assets/icon.png
  android: true
  ios: true
  web: true

flutter:
  uses-material-design: true
